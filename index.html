<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> 
    <script src="script.js"></script>
    <title>Modules</title>
</head>
<body>
    <navbar id = "navbar">
        <a href="#">Home</a>
        <a href="#">Assignments</a>
        <a href="#">Modules</a>
        <a href="#">Other</a>
    </navbar>
    <label for="views">View Modules:</label>
    <select id="views" onchange="changeView()">
        <option value="today">Today</option>
        <option value="thisweek">This Week</option>
        <option value="all">All Modules</option>
    </select>
    <div id="todayModules" class="module-view">
         <!-- Today's modules will be displayed here -->
    </div>
    <div id="thisWeekModules" class="module-view" style="display:none;">
        <!-- This week's modules will be displayed here -->
    </div>
    <div id="allModules" class="module-view" style="display:none;">
        <!-- All modules will be displayed here -->
    </div>
</body>
</html>
